# viewport — example configuration
# Copy this file to config.yaml and edit as needed.
# Run: python3 main.py config.yaml

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Verbosity: DEBUG | INFO | WARNING | ERROR  (default: INFO)
log_level: INFO

# ---------------------------------------------------------------------------
# Display settings
# ---------------------------------------------------------------------------
display:
  width: 1920     # output resolution width  (must match your display)
  height: 1080    # output resolution height (must match your display)
  framerate: 15   # compositor output framerate (fps).  Set to match your cameras'
                  # stream framerate (UniFi Protect high-quality = 15 or 20 fps).
                  # This MUST be set: without it the compositor waits for all 6
                  # RTSP clocks to agree on a timestamp, producing <1 fps output.
  # connector_id: 42  # DRM connector ID for kmssink.  Omit for auto-detect.
                      # Run `modetest -c` on the Pi to list available IDs.

# ---------------------------------------------------------------------------
# Decoder settings
# ---------------------------------------------------------------------------
decoder:
  # Prefer hardware-accelerated decoding (v4l2h264dec / v4l2h265dec).
  # Falls back to software (avdec_h264 / avdec_h265) if hardware is unavailable.
  prefer_hardware: true

# ---------------------------------------------------------------------------
# Named stream registry  (optional)
#
# Map friendly names to RTSP URLs.  Names can then be used anywhere a raw URL
# is accepted: in cells, and as members of groups.
#
# Rules:
#   - Values must be full URLs containing "://"
#   - Names must be unique across both streams and groups
# ---------------------------------------------------------------------------
streams:
  front_door:    rtsp://192.168.1.100/stream1
  back_yard:     rtsp://192.168.1.101/stream1
  driveway:      rtsp://192.168.1.102/stream1
  garage:        rtsp://192.168.1.103/stream1
  side_gate:     rtsp://192.168.1.104/stream1
  # Credentials can be embedded in the URL as usual:
  # lobby:       rtsp://admin:password@192.168.1.105/stream1

# ---------------------------------------------------------------------------
# Camera group registry  (optional)
#
# Map group names to a list of stream names (or raw URLs).
# A group referenced in a cell's streams list is expanded (flattened) inline
# to all of its member URLs, in order.
#
# Rules:
#   - Members may be names defined in the streams section, or raw URLs
#   - Groups cannot reference other groups
#   - Group names must not clash with stream names
# ---------------------------------------------------------------------------
groups:
  exterior:    [front_door, back_yard, driveway]
  garage_area: [garage, side_gate]

# ---------------------------------------------------------------------------
# Cells — exactly 6 entries (3 rows × 2 columns).
#
# Grid layout:
#   ┌────────────┬────────────┐
#   │  cells[0]  │  cells[1]  │  row 0
#   ├────────────┼────────────┤
#   │  cells[2]  │  cells[3]  │  row 1
#   ├────────────┼────────────┤
#   │  cells[4]  │  cells[5]  │  row 2
#   └────────────┴────────────┘
#
# Each cell supports:
#   streams:            list of stream references (required, at least one)
#   rotation_interval:  seconds between stream switches (default: 0 = disabled)
#   codec:              h264 (default) or h265
#
# Each item in a streams list is resolved in order:
#   1. Contains "://"  →  used as a raw RTSP URL
#   2. Matches a name in the streams section  →  resolved to its URL
#   3. Matches a name in the groups section  →  expanded to all member URLs
#
# If you configure fewer than 6 cells, the remaining cells show black.
# ---------------------------------------------------------------------------
cells:
  # Cell 0 — top-left: single named stream
  - streams:
      - front_door

  # Cell 1 — top-right: group expansion — rotates through all exterior cameras
  - streams:
      - exterior         # expands to: front_door, back_yard, driveway
    rotation_interval: 20

  # Cell 2 — middle-left: single named H.265 stream
  - streams:
      - garage
    codec: h265

  # Cell 3 — middle-right: mix of a name, a group, and a raw URL
  - streams:
      - side_gate        # named stream
      - garage_area      # group — expands to garage + side_gate
      - rtsp://192.168.1.110/stream1   # raw URL (backward compatible)
    rotation_interval: 15

  # Cell 4 — bottom-left: raw URLs only (backward compatible, no named streams needed)
  - streams:
      - rtsp://192.168.1.106/stream1
      - rtsp://192.168.1.107/stream1
    rotation_interval: 30

  # Cell 5 — bottom-right: raw URL with embedded credentials
  - streams:
      - rtsp://admin:password@192.168.1.108/stream1
