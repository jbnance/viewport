name: Dependency Submission

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC

permissions:
  contents: write   # required by the Dependency Submission API
  id-token: write   # required by component-detection

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Submit Python dependencies
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.1
        with:
          # Pip and SimplePip are off by default and must be explicitly enabled.
          detectorArgs: Pip=EnableIfDefaultOff,SimplePip=EnableIfDefaultOff
